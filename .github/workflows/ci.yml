name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download root dependencies
        run: go mod download

      - name: Download testdata dependencies
        working-directory: ./testdata
        run: go mod download

      - name: Run tests
        run: go test -v ./...